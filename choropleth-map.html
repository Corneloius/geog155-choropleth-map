<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEOG 155 Choropleth Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .page {
        width: min(1300px, 96vw);
        margin: 1rem auto;
      }

      .map-title {
        margin: 0 0 0.1rem;
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(1.55rem, 2.4vw, 2.15rem);
        line-height: 1.2;
      }

      .map-subtitle {
        margin: 0 0 0.75rem;
        color: var(--muted);
        font-size: 0.95rem;
      }

      #map {
        position: relative;
        height: calc(100vh - 140px);
        min-height: 620px;
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
        overflow: hidden;
        background: #eef2f7;
      }

      .leaflet-container {
        font-family: "Inter", system-ui, sans-serif;
      }

      .leaflet-interactive {
        transition: fill 0.25s ease, fill-opacity 0.25s ease, stroke-width 0.2s ease;
      }

      .card-control {
        background: var(--card-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      }

      .legend-control {
        padding: 10px 12px;
        width: 250px;
      }

      .legend-title {
        margin: 0 0 8px;
        font-size: 0.86rem;
        font-weight: 700;
      }

      .legend-gradient {
        height: 12px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: linear-gradient(
          90deg,
          #deebf7 0%,
          #9ecae1 25%,
          #6baed6 50%,
          #3182bd 75%,
          #08306b 100%
        );
        margin-bottom: 8px;
      }

      .legend-labels {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        margin: 0;
        padding: 0;
        list-style: none;
        font-size: 0.67rem;
        color: #334155;
      }

      .legend-labels li {
        text-align: center;
        line-height: 1.2;
      }

      .north-arrow {
        width: 54px;
        height: 74px;
        padding: 6px;
        display: grid;
        place-items: center;
      }

      .north-arrow svg {
        display: block;
      }

      .info-panel {
        padding: 12px 14px;
        width: 305px;
      }

      .info-panel h3 {
        margin: 0 0 6px;
        font-size: 0.96rem;
      }

      .info-panel p {
        margin: 4px 0;
        color: #334155;
        font-size: 0.82rem;
      }

      .state-name {
        font-weight: 700;
        color: #0f172a;
      }

      .reset-btn {
        margin-top: 8px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
      }

      .reset-btn:hover {
        background: #eff6ff;
      }

      .state-tooltip {
        background: rgba(15, 23, 42, 0.96);
        color: #f8fafc;
        border-radius: 8px;
        border: none;
        box-shadow: 0 8px 20px rgba(2, 6, 23, 0.28);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 0.78rem;
        line-height: 1.35;
        padding: 8px 10px;
      }

      .state-tooltip strong {
        display: block;
        margin-bottom: 2px;
      }

      .map-footer {
        margin-top: 0.72rem;
        color: #334155;
        font-size: 0.8rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem 1.1rem;
      }

      @media (max-width: 960px) {
        #map {
          min-height: 560px;
          height: calc(100vh - 170px);
        }

        .info-panel {
          width: 250px;
        }

        .legend-control {
          width: 230px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="map-title">Peptide &amp; Wellness Supplement Interest by U.S. State</h1>
      <p class="map-subtitle">Based on Google Trends Search Interest Index, 2024</p>
      <section id="map" aria-label="Interactive choropleth map of U.S. states"></section>
      <footer class="map-footer">
        <span
          >Source: Google Trends Search Interest Index (2024) | CDC NHANES Supplement Data
          (2021)</span
        >
        <span>Bronson | GEOG 155 | University of Nebraska-Lincoln | Spring 2026</span>
      </footer>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const peptideData = {
        California: 91,
        Colorado: 88,
        "New York": 85,
        Washington: 83,
        Oregon: 80,
        Florida: 78,
        Texas: 74,
        Arizona: 72,
        Nevada: 70,
        Utah: 69,
        Massachusetts: 68,
        Georgia: 66,
        "North Carolina": 64,
        Virginia: 63,
        Illinois: 61,
        Minnesota: 59,
        Tennessee: 57,
        Michigan: 55,
        Pennsylvania: 54,
        Ohio: 52,
        "New Jersey": 51,
        Maryland: 50,
        Connecticut: 49,
        Wisconsin: 47,
        Missouri: 46,
        Indiana: 44,
        "South Carolina": 43,
        Kansas: 41,
        Nebraska: 40,
        Iowa: 38,
        Idaho: 37,
        "New Mexico": 36,
        Montana: 35,
        Oklahoma: 34,
        Kentucky: 33,
        Arkansas: 31,
        Louisiana: 30,
        Alabama: 29,
        Mississippi: 27,
        "West Virginia": 26,
        Wyoming: 25,
        "South Dakota": 24,
        "North Dakota": 23,
        Alaska: 22,
        Hawaii: 68,
        Maine: 35,
        "New Hampshire": 42,
        Vermont: 39,
        "Rhode Island": 46,
        Delaware: 44,
      };

      const classBreaks = [
        { min: 0, max: 29, label: "Very Low", color: "#deebf7" },
        { min: 30, max: 44, label: "Low", color: "#9ecae1" },
        { min: 45, max: 59, label: "Moderate", color: "#6baed6" },
        { min: 60, max: 74, label: "High", color: "#3182bd" },
        { min: 75, max: 100, label: "Very High", color: "#08306b" },
      ];

      function getCategory(value) {
        for (const range of classBreaks) {
          if (value >= range.min && value <= range.max) {
            return range.label;
          }
        }
        return "No Data";
      }

      function getColor(value) {
        if (typeof value !== "number") return "#cccccc";
        for (const range of classBreaks) {
          if (value >= range.min && value <= range.max) {
            return range.color;
          }
        }
        return "#cccccc";
      }

      const map = L.map("map", {
        zoomControl: true,
        attributionControl: true,
      }).setView([39.8283, -98.5795], 4);

      map.attributionControl.setPrefix("Leaflet");

      L.control
        .scale({
          imperial: true,
          metric: true,
          position: "bottomleft",
        })
        .addTo(map);

      let geojsonLayer;
      let selectedLayer = null;

      const infoControl = L.control({ position: "bottomleft" });
      infoControl.onAdd = function onAdd() {
        this._div = L.DomUtil.create("div", "card-control info-panel");
        this._div.innerHTML = `
          <h3>State Details</h3>
          <p>Click a state to pin details here.</p>
          <button type="button" class="reset-btn" id="resetViewBtn">Reset View</button>
        `;
        return this._div;
      };
      infoControl.addTo(map);

      const legendControl = L.control({ position: "bottomright" });
      legendControl.onAdd = function onAdd() {
        const div = L.DomUtil.create("div", "card-control legend-control");
        div.innerHTML = `
          <p class="legend-title">Interest Intensity</p>
          <div class="legend-gradient" role="img" aria-label="Very Low to Very High color scale"></div>
          <ul class="legend-labels">
            <li>Very Low</li>
            <li>Low</li>
            <li>Moderate</li>
            <li>High</li>
            <li>Very High</li>
          </ul>
        `;
        return div;
      };
      legendControl.addTo(map);

      const northArrowControl = L.control({ position: "topright" });
      northArrowControl.onAdd = function onAdd() {
        const div = L.DomUtil.create("div", "card-control north-arrow");
        div.innerHTML = `
          <svg width="30" height="58" viewBox="0 0 30 58" aria-label="North arrow" role="img">
            <text x="15" y="11" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">N</text>
            <path d="M15 14 L24 44 L15 38 L6 44 Z" fill="#0f172a"></path>
            <path d="M15 16 L20.5 34 L15 30 L9.5 34 Z" fill="#ffffff"></path>
          </svg>
        `;
        return div;
      };
      northArrowControl.addTo(map);

      function resetHighlight(event) {
        const layer = event.target;
        if (selectedLayer && selectedLayer === layer) {
          return;
        }
        geojsonLayer.resetStyle(layer);
      }

      function highlightFeature(event) {
        const layer = event.target;
        layer.setStyle({
          weight: 2,
          color: "#0b2545",
          fillOpacity: 0.95,
        });
        layer.bringToFront();
      }

      function updateInfo(feature) {
        const stateName = feature.properties.name;
        const score = peptideData[stateName];
        const category = getCategory(score);
        infoControl._div.innerHTML = `
          <h3>State Details</h3>
          <p><span class="state-name">${stateName}</span></p>
          <p>Interest score: <strong>${typeof score === "number" ? score : "N/A"}</strong></p>
          <p>Category: <strong>${category}</strong></p>
          <button type="button" class="reset-btn" id="resetViewBtn">Reset View</button>
        `;
        wireResetButton();
      }

      function zoomToFeature(event) {
        const layer = event.target;
        if (selectedLayer) {
          geojsonLayer.resetStyle(selectedLayer);
        }
        selectedLayer = layer;
        layer.setStyle({
          weight: 2.6,
          color: "#081f3f",
          fillOpacity: 1,
        });
        map.fitBounds(layer.getBounds(), {
          maxZoom: 6,
          padding: [28, 28],
          animate: true,
        });
        updateInfo(layer.feature);
      }

      function wireResetButton() {
        const resetBtn = document.getElementById("resetViewBtn");
        if (!resetBtn) return;
        resetBtn.onclick = () => {
          if (selectedLayer) {
            geojsonLayer.resetStyle(selectedLayer);
            selectedLayer = null;
          }
          map.setView([39.8283, -98.5795], 4, {
            animate: true,
          });
          infoControl._div.innerHTML = `
            <h3>State Details</h3>
            <p>Click a state to pin details here.</p>
            <button type="button" class="reset-btn" id="resetViewBtn">Reset View</button>
          `;
          wireResetButton();
        };
      }

      function onEachFeature(feature, layer) {
        const stateName = feature.properties.name;
        const score = peptideData[stateName];
        const category = getCategory(score);

        layer.bindTooltip(
          `<strong>${stateName}</strong>
          Score: ${typeof score === "number" ? score : "N/A"}<br>
          Category: ${category}`,
          {
            sticky: true,
            className: "state-tooltip",
            direction: "top",
            offset: [0, -6],
          }
        );

        layer.on({
          mouseover: highlightFeature,
          mouseout: resetHighlight,
          click: zoomToFeature,
        });
      }

      wireResetButton();

      fetch(
        "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json"
      )
        .then((response) => {
          if (!response.ok) {
            throw new Error("Could not load GeoJSON data.");
          }
          return response.json();
        })
        .then((geojson) => {
          geojsonLayer = L.geoJSON(geojson, {
            style: (feature) => {
              const stateName = feature.properties.name;
              const value = peptideData[stateName];
              return {
                fillColor: getColor(value),
                weight: 1,
                opacity: 1,
                color: "#ffffff",
                fillOpacity: 0.86,
              };
            },
            onEachFeature,
          }).addTo(map);
        })
        .catch((error) => {
          infoControl._div.innerHTML = `
            <h3>State Details</h3>
            <p>GeoJSON load failed.</p>
            <p>${error.message}</p>
            <button type="button" class="reset-btn" id="resetViewBtn">Reset View</button>
          `;
          wireResetButton();
        });
    </script>
  </body>
</html>
